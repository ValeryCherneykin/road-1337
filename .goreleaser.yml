version: 2
project_name: road-1337

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: road-1337
    main: ./cmd/road-1337
    binary: road-1337
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: ValeryCherneykin
    name: road-1337
  mode: replace
  name_template: "v{{ .Version }}"

brews:
  - name: road-1337
    repository:
      owner: ValeryCherneykin
      name: homebrew-road-1337
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/ValeryCherneykin/road-1337
    description: "End-to-end encrypted terminal messenger"
    license: MIT
    install: |
      bin.install "road-1337"

# ────────────────────────────────────────────────
# Docker Support (Multi-arch images)
# ────────────────────────────────────────────────
dockers:
  - image_templates:
      - "ghcr.io/ValeryCherneykin/road-1337:{{ .Version }}-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"

  - image_templates:
      - "ghcr.io/ValeryCherneykin/road-1337:{{ .Version }}-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"

docker_manifests:
  - name_template: "ghcr.io/ValeryCherneykin/road-1337:{{ .Version }}"
    image_templates:
      - "ghcr.io/ValeryCherneykin/road-1337:{{ .Version }}-amd64"
      - "ghcr.io/ValeryCherneykin/road-1337:{{ .Version }}-arm64"
  - name_template: "ghcr.io/ValeryCherneykin/road-1337:latest"
    image_templates:
      - "ghcr.io/ValeryCherneykin/road-1337:{{ .Version }}-amd64"
      - "ghcr.io/ValeryCherneykin/road-1337:{{ .Version }}-arm64"
