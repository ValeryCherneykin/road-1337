version: 2
project_name: road-1337

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: road-1337
    main: ./cmd/road-1337
    binary: road-1337
    env:
      - cgo_enabled=0
    ldflags:
      - -s -w -x main.version={{.version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .projectname }}_{{ .version }}_{{ .os }}_{{ .arch }}"
    files:
      - license
      - readme.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: valerycherneykin
    name: road-1337
  mode: replace
  name_template: "v{{ .version }}"

brews:
  - name: road-1337
    repository:
      owner: valerycherneykin
      name: homebrew-road-1337
      token: "{{ .Env.ROAD_1337_TOKEN }}"
    directory: formula
    homepage: https://github.com/valerycherneykin/road-1337
    description: "end-to-end encrypted terminal messenger"
    license: mit
    install: |
      bin.install "road-1337"

scoops:
  - name: road-1337
    repository:
      owner: ValeryCherneykin
      name: scoop-road-1337
      token: "{{ .Env.ROAD_1337_TOKEN }}"
    homepage: https://github.com/ValeryCherneykin/road-1337
    description: "End-to-end encrypted terminal messenger"
    license: MIT

# ────────────────────────────────────────────────
# docker support (multi-arch images)
# ────────────────────────────────────────────────
dockers:
  - image_templates:
      - "ghcr.io/valerycherneykin/road-1337:{{ .version }}-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .projectname }}"
      - "--label=org.opencontainers.image.version={{ .version }}"

  - image_templates:
      - "ghcr.io/valerycherneykin/road-1337:{{ .version }}-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .projectname }}"
      - "--label=org.opencontainers.image.version={{ .version }}"

docker_manifests:
  - name_template: "ghcr.io/valerycherneykin/road-1337:{{ .version }}"
    image_templates:
      - "ghcr.io/valerycherneykin/road-1337:{{ .version }}-amd64"
      - "ghcr.io/valerycherneykin/road-1337:{{ .version }}-arm64"
  - name_template: "ghcr.io/valerycherneykin/road-1337:latest"
    image_templates:
      - "ghcr.io/valerycherneykin/road-1337:{{ .version }}-amd64"
      - "ghcr.io/valerycherneykin/road-1337:{{ .version }}-arm64"
