# Taskfile.yml for github.com/ValeryCherneykin/road-1337
# Task runner for development workflow automation
# https://taskfile.dev

version: '3'

# ────────────────────────────────────────────────
# Global Variables
# ────────────────────────────────────────────────
vars:
  # Tool versions (pinned for reproducibility)
  GO_VERSION: '1.25'
  GOLANGCI_LINT_VERSION: 'v2.6.1'
  GCI_VERSION: 'latest'
  GOFUMPT_VERSION: 'latest'
  
  # Paths
  BIN_DIR: '{{.ROOT_DIR}}/bin'
  GOLANGCI_LINT: '{{.BIN_DIR}}/golangci-lint'
  GCI: '{{.BIN_DIR}}/gci'
  GOFUMPT: '{{.BIN_DIR}}/gofumpt'
  
  # Project module (for gci import grouping)
  MODULE: 'github.com/ValeryCherneykin/road-1337'

# ────────────────────────────────────────────────
# Tasks
# ────────────────────────────────────────────────
tasks:
  # ══════════════════════════════════════════════
  # HELP
  # ══════════════════════════════════════════════
  default:
    desc: "Show available commands"
    cmds:
      - task --list
    silent: true

  # ══════════════════════════════════════════════
  # TOOL INSTALLATION
  # ══════════════════════════════════════════════
  install-tools:
    desc: "Install all development tools"
    deps:
      - install-formatters
      - install-golangci-lint
    cmds:
      - echo "✅ All tools installed in ./bin/"

  install-formatters:
    desc: "Install gofumpt and gci formatters"
    cmds:
      - |
        echo "📦 Installing formatters in ./bin/..."
        mkdir -p {{.BIN_DIR}}
        GOBIN={{.BIN_DIR}} go install mvdan.cc/gofumpt@{{.GOFUMPT_VERSION}}
        GOBIN={{.BIN_DIR}} go install github.com/daixiang0/gci@{{.GCI_VERSION}}
        echo "✅ Installed:"
        {{.GOFUMPT}} -version
        {{.GCI}} --version
    status:
      - test -x {{.GOFUMPT}}
      - test -x {{.GCI}}

  install-golangci-lint:
    desc: "Install golangci-lint linter"
    cmds:
      - |
        echo "📦 Installing golangci-lint {{.GOLANGCI_LINT_VERSION}}..."
        mkdir -p {{.BIN_DIR}}
        GOBIN={{.BIN_DIR}} go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
        echo "✅ Installed:"
        {{.GOLANGCI_LINT}} version
    status:
      - test -x {{.GOLANGCI_LINT}}

  # ══════════════════════════════════════════════
  # CODE FORMATTING
  # ══════════════════════════════════════════════
  fmt:
    desc: "Format code (gofumpt + gci)"
    deps: [install-formatters]
    cmds:
      - |
        echo "✨ Formatting code..."
        {{.GOFUMPT}} -l -w .
        {{.GCI}} write --skip-generated -s standard -s default -s "prefix({{.MODULE}})" .
        echo "✅ Formatting complete!"

  # ══════════════════════════════════════════════
  # LINTING
  # ══════════════════════════════════════════════
  lint:
    desc: "Run golangci-lint"
    deps: [install-golangci-lint]
    cmds:
      - |
        echo "🔍 Running golangci-lint..."
        {{.GOLANGCI_LINT}} run ./...

  lint-fix:
    desc: "Auto-fix linting issues where possible"
    deps: [install-golangci-lint]
    cmds:
      - |
        echo "🔧 Auto-fixing issues..."
        {{.GOLANGCI_LINT}} run --fix ./...

  lint-new:
    desc: "Lint only changed files (fast)"
    deps: [install-golangci-lint]
    cmds:
      - |
        echo "⚡ Checking changed files..."
        {{.GOLANGCI_LINT}} run --new ./...

  # ══════════════════════════════════════════════
  # TESTING
  # ══════════════════════════════════════════════
  test:
    desc: "Run tests"
    cmds:
      - |
        echo "🧪 Running tests..."
        go test -v -count=1 ./...

  test-race:
    desc: "Run tests with race detector"
    cmds:
      - |
        echo "🏃 Running tests with race detector..."
        go test -v -race -count=1 ./...

  test-coverage:
    desc: "Run tests with coverage report"
    cmds:
      - |
        echo "📊 Generating coverage report..."
        go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
        go tool cover -html=coverage.out -o coverage.html
        echo "✅ Coverage report: coverage.html"

  test-short:
    desc: "Run short tests only"
    cmds:
      - |
        echo "⚡ Running short tests..."
        go test -short -count=1 ./...

  coverage-summary:
    desc: "Show coverage summary"
    cmds:
      - |
        go test -coverprofile=coverage.out ./... > /dev/null 2>&1
        echo "📊 Coverage summary:"
        go tool cover -func=coverage.out | tail -1

  # ══════════════════════════════════════════════
  # BENCHMARKING
  # ══════════════════════════════════════════════
  bench:
    desc: "Run benchmarks"
    cmds:
      - |
        echo "⚡ Running benchmarks..."
        go test -bench=. -benchmem -benchtime=3s ./...

  bench-save:
    desc: "Save benchmark results to file"
    cmds:
      - |
        echo "💾 Saving benchmark results..."
        go test -bench=. -benchmem -count=10 ./... | tee bench.txt
        echo "✅ Results saved to bench.txt"

  bench-compare:
    desc: "Compare benchmark results (requires benchstat)"
    cmds:
      - |
        echo "📊 Comparing benchmarks..."
        benchstat old.txt new.txt

  # ══════════════════════════════════════════════
  # STATIC ANALYSIS
  # ══════════════════════════════════════════════
  vet:
    desc: "Run go vet"
    cmds:
      - |
        echo "🔍 Running go vet..."
        go vet ./...

  # ══════════════════════════════════════════════
  # DEPENDENCIES
  # ══════════════════════════════════════════════
  mod-tidy:
    desc: "Tidy go.mod and go.sum"
    cmds:
      - |
        echo "📦 Running go mod tidy..."
        go mod tidy

  mod-verify:
    desc: "Verify dependencies"
    cmds:
      - |
        echo "🔍 Verifying dependencies..."
        go mod verify

  mod-download:
    desc: "Download dependencies"
    cmds:
      - |
        echo "📥 Downloading dependencies..."
        go mod download

  mod-update:
    desc: "Update all dependencies"
    cmds:
      - |
        echo "⬆️ Updating dependencies..."
        go get -u ./...
        go mod tidy

  # ══════════════════════════════════════════════
  # COMBINED CHECKS
  # ══════════════════════════════════════════════
  check:
    desc: "Full check (fmt + vet + lint + test)"
    deps:
      - fmt
      - vet
      - lint
      - test
    cmds:
      - echo "✅ All checks passed!"

  ci:
    desc: "CI pipeline (check + coverage)"
    deps:
      - check
      - test-coverage
    cmds:
      - echo "✅ CI checks complete!"

  pre-commit:
    desc: "Pre-commit checks (fmt + lint-new + test-short)"
    deps:
      - fmt
      - lint-new
      - test-short
    cmds:
      - echo "✅ Pre-commit checks passed!"

  # ══════════════════════════════════════════════
  # CLEANUP
  # ══════════════════════════════════════════════
  clean:
    desc: "Clean temporary files"
    cmds:
      - |
        echo "🧹 Cleaning temporary files..."
        rm -f coverage.out coverage.html
        rm -f bench.txt *.bench
        rm -f *.test *.prof
        rm -f cpu.prof mem.prof trace.out
        go clean -cache -testcache
        echo "✅ Cleanup complete!"

  clean-all:
    desc: "Full cleanup (including ./bin/)"
    deps: [clean]
    cmds:
      - |
        echo "🧹 Removing ./bin/..."
        rm -rf {{.BIN_DIR}}
        echo "✅ Full cleanup complete!"

  # ══════════════════════════════════════════════
  # BUILD (optional for examples/benchmarks)
  # ══════════════════════════════════════════════
  build-examples:
    desc: "Build all examples"
    cmds:
      - |
        echo "🔨 Building examples..."
        for dir in examples/*/; do
          if [ -f "$dir/main.go" ]; then
            echo "Building $dir..."
            (cd "$dir" && go build -o ../../bin/$(basename "$dir"))
          fi
        done
        echo "✅ Examples built in ./bin/"

  # ══════════════════════════════════════════════
  # DOCUMENTATION
  # ══════════════════════════════════════════════
  docs:
    desc: "Generate documentation (godoc)"
    cmds:
      - |
        echo "📚 Starting godoc server..."
        echo "Open http://localhost:6060/pkg/{{.MODULE}}/"
        godoc -http=:6060

  # ══════════════════════════════════════════════
  # RELEASE (optional)
  # ══════════════════════════════════════════════
  tag:
    desc: "Create a git tag (usage: task tag -- v1.0.0)"
    cmds:
      - |
        TAG={{.CLI_ARGS}}
        if [ -z "$TAG" ]; then
          echo "❌ Error: tag version required"
          echo "Usage: task tag -- v1.0.0"
          exit 1
        fi
        echo "🏷️ Creating tag $TAG..."
        git tag -a "$TAG" -m "Release $TAG"
        echo "✅ Tag $TAG created"
        echo "Push with: git push origin $TAG"
